name: 🗑️ Storage Cleanup

on:
  schedule:
    - cron: '0 3 * * *' # Ogni giorno alle 03:00 UTC
  workflow_dispatch: # Permette l'avvio manuale da GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Cleanup Script
        env:
          VITE_SUPABASE_URL: "https://gqetgbqlxljhhcaggoke.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/cleanup_reports.mjs
